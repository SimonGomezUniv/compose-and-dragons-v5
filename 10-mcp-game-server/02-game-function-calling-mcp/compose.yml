services:
# docker compose up --build -d
# docker compose up -d
# docker compose exec talk-to-dungeon /bin/sh


  mcp-gateway:
    # mcp-gateway secures your MCP servers
    image: docker/mcp-gateway:v2
    ports:
      - 9011:9011
    use_api_socket: true
    command:
      - --port=9011
      - --transport=streaming
      - --verbose
      - --catalog=/mcp/catalog.yaml
      - --servers=dungeon-mcp-server
      #- --tools=dungeon-mcp-server:*
      - --tools=dungeon-mcp-server:get_map,answer_riddle,attack,collect_items,drink_potion,move,save_game,start_combat,talk_to_npcs,get_current_room,get_game_status,get_inventory,get_help

    configs:
      - source: catalog.yaml
        target:
          /mcp/catalog.yaml
    depends_on:
      dungeon-mcp-server:
        condition: service_healthy

  dungeon-mcp-server:
    build:
      context: ./dungeon-mcp-server
      dockerfile: Dockerfile

    # stdin_open: true    # ← important
    # tty: true           # ← important

    environment:
      MCP_HTTP_PORT: 6060
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    volumes:
      - ./dungeon-mcp-server/data:/app/data:rw

  # Transport Type: Streamable HTTP
  # URL: http://mcp-gateway:9011/mcp
  # or http://dungeon-mcp-server:6060/mcp ✋
  # Connection Type: Via Proxy ✋
  # Use the provided URL in the logs to connect to the MCP Inspector
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    command: ["--config", "/app/mcp.json"]
    ports:
      - 6274:6274
      - 6277:6277
    environment:
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: "http://0.0.0.0:6274,http://localhost:6274"
      MCP_AUTO_OPEN_ENABLED: false
    depends_on:
      - mcp-gateway

  talk-to-dungeon:
    build:
      context: ./function-calling-with-mcp
      dockerfile: Dockerfile

    stdin_open: true    # ← important
    tty: true           # ← important

    environment:
      MCP_GATEWAY_URL: http://mcp-gateway:9011/mcp

    models:
      dungeon-tools-model:
        endpoint_var: ENGINE_BASE_URL
        model_var: TOOLS_MODEL

      dungeon-master-buddy:
        endpoint_var: ENGINE_BASE_URL
        model_var: BUDDY_MODEL

    depends_on:
      mcp-gateway:
        condition: service_started


configs:
  catalog.yaml:
    content: |
      registry:

        dungeon-mcp-server:
          remote:
            url: "http://dungeon-mcp-server:6060/mcp"
            transport_type: http

models:

  dungeon-tools-model:
    #model: hf.co/menlo/jan-nano-gguf:q4_k_m
    model: huggingface.co/menlo/jan-nano-gguf:q4_k_m
    #model: huggingface.co/menlo/jan-nano-gguf:q8_0
    #model: ai/qwen2.5:latest
    #model: huggingface.co/menlo/lucy-gguf:q4_k_m
    #model: ai/qwen3:latest
    context_size: 16384

  dungeon-master-buddy:
    model: huggingface.co/menlo/lucy-gguf:q4_k_m
    context_size: 16384