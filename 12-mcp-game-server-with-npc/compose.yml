services:
# docker compose up --build -d
# docker compose exec dungeon-master /bin/sh

  # [MCP GATEWAY]
  mcp-gateway:
    # mcp-gateway secures your MCP servers
    image: docker/mcp-gateway:v2
    ports:
      - 9011:9011
    use_api_socket: true
    command:
      - --port=9011
      - --transport=streaming
      - --verbose
      - --catalog=/mcp/catalog.yaml
      - --servers=dungeon-mcp-server
      #- --tools=dungeon-mcp-server:*
      - --tools=dungeon-mcp-server:get_map,answer_riddle,attack,collect_items,drink_potion,move,save_game,start_combat,talk_to_npcs,get_current_room,get_game_status,get_inventory,get_help

    configs:
      - source: catalog.yaml
        target:
          /mcp/catalog.yaml
    depends_on:
      dungeon-mcp-server:
        condition: service_healthy

  # [DUNGEON MCP SERVER]
  dungeon-mcp-server:
    build:
      context: ./dungeon-mcp-server
      dockerfile: Dockerfile

    environment:
      MCP_HTTP_PORT: 6060
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    volumes:
      - ./dungeon-mcp-server/data:/app/data:rw

  # [MCP INSPECTOR]
  # Transport Type: Streamable HTTP
  # URL: http://mcp-gateway:9011/mcp
  # or http://dungeon-mcp-server:6060/mcp ✋
  # Connection Type: Via Proxy ✋
  # Use the provided URL in the logs to connect to the MCP Inspector
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    command: ["--config", "/app/mcp.json"]
    ports:
      - 6274:6274
      - 6277:6277
    environment:
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: "http://0.0.0.0:6274,http://localhost:6274"
      MCP_AUTO_OPEN_ENABLED: false
    depends_on:
      - mcp-gateway

  # [DUNGEON MASTER] — powered by docker-agent
  # Usage: docker compose exec dungeon-master /docker-agent run --yolo /work/dungeon-master.yaml
  # Or run interactively: docker compose run --rm dungeon-master run --yolo /work/dungeon-master.yaml
  dungeon-master:
    image: docker/docker-agent:1.43.0

    stdin_open: true    # ← important for interactive mode
    tty: true           # ← important for interactive mode

    command: ["run", "--yolo", "/work/dungeon-master.yaml"]

    volumes:
      - ./dungeon-master.yaml:/work/dungeon-master.yaml:ro
      - ./non-player-characters/sheets:/work/sheets:ro

    environment:
      #OPENAI_KEY: "who is this bob?"
      TERM: xterm-256color
      COLORTERM: truecolor

    depends_on:
      mcp-gateway:
        condition: service_started

# [CONFIG]
configs:
  # MCP CATALOG
  catalog.yaml:
    content: |
      registry:

        dungeon-mcp-server:
          remote:
            url: "http://dungeon-mcp-server:6060/mcp"
            transport_type: http

